<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../pontaj/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pontaj — Registru Electronic Locație</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }
  button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; font: inherit; }
  a { color: inherit; }

  :root {
    --bg: #0D1117;
    --surface: #161B22;
    --surface2: #21262D;
    --gold: #C8A96E;
    --gold-dim: rgba(200,169,110,0.12);
    --text: #E6EDF3;
    --muted: #8B949E;
    --border: #30363D;
    --green: #3FB950;
    --yellow: #D2A64A;
    --red: #F85149;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
  }

  ::selection { background: var(--gold-dim); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }

  h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 600; }

  /* ══ AUTH ══ */
  #auth-screen {
    min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 20px; background: var(--bg);
  }
  .auth-brand { text-align: center; margin-bottom: 30px; }
  .auth-logo { font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 600; letter-spacing: 0.18em; color: var(--gold); }
  .auth-rule { width: 60px; height: 1px; background: var(--gold); margin: 14px auto; opacity: 0.4; }
  .auth-sub { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
  .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 100%; max-width: 360px; }
  .auth-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); display: block; margin-bottom: 6px; }
  .auth-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 12px; outline: none; transition: border-color .15s;
  }
  .auth-input:focus { border-color: var(--gold); }
  .auth-fields { display: flex; flex-direction: column; gap: 14px; }
  .auth-submit {
    background: var(--gold); border: none; border-radius: 8px; color: #0D1117; font-weight: 600; font-size: 14px;
    padding: 11px; cursor: pointer; transition: opacity .15s; letter-spacing: .02em;
  }
  .auth-submit:hover { opacity: .85; }
  .auth-demo {
    width: 100%; padding: 11px; background: transparent; border: 1px solid var(--gold); border-radius: 8px; color: var(--gold);
    font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: .04em; transition: background .15s;
  }
  .auth-demo:hover { background: rgba(200,169,110,.1); }
  .auth-hint { font-size: 11px; color: var(--muted); margin-top: 8px; text-align: center; }
  .auth-select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 14px; padding: 10px 12px; }
  .lang-switch { display: inline-flex; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2px; }
  .lang-btn { background: none; border: none; color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: .04em; padding: 5px 11px; border-radius: 16px; cursor: pointer; transition: all .15s; }
  .lang-btn.active { background: var(--gold); color: var(--bg); }
  .auth-lang { display: flex; justify-content: center; margin-top: 16px; }

  /* ══ APP SHELL ══ */
  #app-shell { display: none; min-height: 100dvh; }
  #app-shell.visible { display: flex; }

  #sidebar {
    width: 232px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; height: 100dvh; position: sticky; top: 0; overflow-y: auto;
  }
  .sb-brand { padding: 22px 20px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .sb-brand img { width: 28px; height: 28px; }
  .sb-brand-text { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; letter-spacing: .1em; color: var(--gold); line-height: 1.2; }
  .sb-brand-sub { font-size: 9px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
  .sb-nav { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 2px; }
  .sb-item {
    display: flex; align-items: center; gap: 11px; padding: 9px 12px; border-radius: 7px; cursor: pointer;
    color: var(--muted); font-size: 13.5px; transition: background .12s, color .12s; border: none; background: none; width: 100%; text-align: left;
  }
  .sb-item:hover { background: var(--surface2); color: var(--text); }
  .sb-item.active { background: var(--gold-dim); color: var(--gold); font-weight: 600; }
  .sb-icon { width: 18px; text-align: center; flex-shrink: 0; font-size: 14px; }
  .sb-badge { margin-left: auto; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; border-radius: 20px; padding: 1px 6px; min-width: 16px; text-align: center; }
  .sb-foot { padding: 14px 20px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border); box-shadow: 0 1px 0 rgba(200,169,110,0.14);
    padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20;
  }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-user { font-size: 13px; color: var(--muted); }

  .btn-ghost {
    background: none; border: 1px solid var(--border); color: var(--muted); font-size: 13px; padding: 7px 14px;
    border-radius: 6px; cursor: pointer; transition: color .15s, border-color .15s;
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn-primary {
    background: var(--gold); border: none; border-radius: 6px; color: #0D1117; font-size: 13px; font-weight: 600;
    padding: 9px 18px; cursor: pointer; transition: opacity .15s; white-space: nowrap;
  }
  .btn-primary:hover { opacity: .85; }
  .btn-primary:disabled, .btn-ghost:disabled { opacity: .4; cursor: not-allowed; }
  .btn-danger { background: none; border: 1px solid rgba(248,81,73,.35); color: var(--red); border-radius: 6px; font-size: 12px; padding: 6px 10px; cursor: pointer; }
  .btn-danger:hover { background: rgba(248,81,73,.1); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-icon { width: 15px; height: 15px; vertical-align: -2px; margin-right: 6px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  #content-scroll { flex: 1; height: 100dvh; overflow-y: auto; }
  main { padding: 28px 32px 60px; max-width: 1220px; margin: 0 auto; width: 100%; }

  .view-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; flex-wrap: wrap; gap: 8px; }
  .view-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; }
  .view-sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }

  .locked-banner {
    background: rgba(200,169,110,.08); border: 1px solid rgba(200,169,110,.3); border-radius: 8px; padding: 10px 16px;
    font-size: 12.5px; color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }

  /* stats */
  .stats-row { display: flex; gap: 12px; margin-bottom: 26px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; flex: 1; min-width: 150px; }
  .stat-card.warn { border-color: rgba(210,166,74,.4); }
  .stat-card.crit { border-color: rgba(248,81,73,.4); }
  .stat-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 8px; }
  .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 600; color: var(--gold); line-height: 1; }
  .stat-value.c-green { color: var(--green); } .stat-value.c-yellow { color: var(--yellow); } .stat-value.c-red { color: var(--red); }
  .stat-sub { font-size: 11.5px; color: var(--muted); margin-top: 5px; }

  /* alerts */
  .alerts-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 26px; overflow: hidden; }
  .alerts-panel-head { padding: 13px 18px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--gold); display: flex; align-items: center; gap: 8px; }
  .alert-row { display: flex; align-items: flex-start; gap: 10px; padding: 11px 18px; border-bottom: 1px solid var(--surface2); font-size: 13px; }
  .alert-row:last-child { border-bottom: none; }
  .alert-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .alert-dot.red { background: var(--red); box-shadow: 0 0 0 3px rgba(248,81,73,.18); }
  .alert-dot.yellow { background: var(--yellow); box-shadow: 0 0 0 3px rgba(210,166,74,.18); }
  .alert-empty { padding: 20px 18px; color: var(--muted); font-size: 13px; text-align: center; }

  /* forms */
  .add-form { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 22px; margin-bottom: 22px; }
  .form-title { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--gold); margin-bottom: 15px; }
  .form-grid { display: grid; gap: 12px; align-items: end; }
  .field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .field label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
  .field input, .field select, .field textarea {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 13.5px; padding: 9px 11px; outline: none; transition: border-color .15s; width: 100%;
  }
  .field textarea { resize: vertical; min-height: 38px; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); }
  .field input::placeholder, .field textarea::placeholder { color: var(--muted); }

  .search-bar { position: relative; margin-bottom: 16px; max-width: 320px; }
  .search-bar input {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13.5px;
    padding: 9px 12px 9px 34px; outline: none; width: 100%;
  }
  .search-bar input:focus { border-color: var(--gold); }
  .search-bar svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

  /* table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
  .table-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; padding: 13px 18px; border-bottom: 1px solid var(--border); }
  .table-title { font-size: 13px; font-weight: 600; }
  .table-hint { color: var(--gold); font-size: 11.5px; }
  .table-scroll { overflow-x: auto; }
  .recent-actions-scroll { height: 540px; overflow: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 10.5px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); font-weight: 500; padding: 10px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 11px 16px; font-size: 13.5px; border-bottom: 1px solid var(--surface2); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface2); cursor: default; }
  tbody tr.clickable:hover td { cursor: pointer; }
  .td-name { color: var(--text); font-weight: 500; cursor: pointer; }
  .td-name:hover { color: var(--gold); text-decoration: underline; }
  .td-muted { color: var(--muted); font-size: 12.5px; }
  .td-gold { color: var(--gold); font-weight: 600; font-variant-numeric: tabular-nums; }
  .td-empty { padding: 30px; text-align: center; color: var(--muted); font-size: 13px; }

  .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
  .badge.green { color: var(--green); background: rgba(63,185,80,.1); border: 1px solid rgba(63,185,80,.3); }
  .badge.yellow { color: var(--yellow); background: rgba(210,166,74,.1); border: 1px solid rgba(210,166,74,.3); }
  .badge.red { color: var(--red); background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3); }
  .badge.muted { color: var(--muted); background: var(--surface2); border: 1px solid var(--border); }
  .badge.gold { color: var(--gold); background: var(--gold-dim); border: 1px solid rgba(200,169,110,.3); }
  button.badge { font-family: inherit; cursor: pointer; transition: filter .15s, transform .15s; }
  button.badge:hover { filter: brightness(1.25); transform: translateY(-1px); }
  button.badge:disabled { cursor: not-allowed; opacity: .55; transform: none; }

  .row-flag { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
  .row-flag.red { background: var(--red); box-shadow: 0 0 0 3px rgba(248,81,73,.18); }
  .row-flag.yellow { background: var(--yellow); box-shadow: 0 0 0 3px rgba(210,166,74,.18); }
  tr.flag-red td:first-child { border-left: 2px solid var(--red); }
  tr.flag-yellow td:first-child { border-left: 2px solid var(--yellow); }

  .tag { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); margin: 2px 4px 2px 0; }
  .inventory-size {
    display: inline-flex; align-items: center; justify-content: center; min-width: 42px;
    padding: 4px 9px; border-radius: 6px; color: var(--gold); background: var(--gold-dim);
    border: 1px solid rgba(200,169,110,.38); font-size: 12.5px; font-weight: 700; letter-spacing: .04em;
  }

  .toggle-group { display: inline-flex; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
  .toggle-btn { background: none; border: none; color: var(--muted); font-size: 12.5px; font-weight: 500; padding: 6px 15px; border-radius: 5px; cursor: pointer; transition: all .15s; }
  .toggle-btn.active { background: var(--gold); color: var(--bg); }

  /* modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
  .modal-overlay.visible { display: flex; }
  .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 720px; padding: 0; }
  .profile-modal-box { max-width: 980px; }
  .modal-head { padding: 20px 26px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-head-actions { display: flex; align-items: center; gap: 10px; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: var(--gold); }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; padding: 4px; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 22px 26px 26px; max-height: 74vh; overflow-y: auto; }
  .profile-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 18px 24px; margin-bottom: 22px; padding: 18px; background: var(--bg); border: 1px solid var(--border); border-radius: 9px; font-size: 13.5px; }
  .profile-grid .k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
  .profile-grid .v { margin-top: 4px; overflow-wrap: anywhere; }
  .profile-history-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; align-items: start; }
  .profile-section { min-width: 0; padding: 15px; background: rgba(13,17,23,.45); border: 1px solid var(--border); border-radius: 9px; }
  .profile-section-title { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--gold); margin: 0 0 10px; }
  .profile-edit-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px 18px; }
  .profile-edit-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }
  .mini-list { display: flex; flex-direction: column; gap: 5px; }
  .mini-row { display: flex; justify-content: space-between; gap: 12px; font-size: 12.5px; padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; }
  .mini-row span:first-child { color: var(--text); }
  .mini-row span:last-child { color: var(--muted); }
  .mini-empty { font-size: 12px; color: var(--muted); padding: 6px 2px; }

  .report-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 22px; margin-bottom: 16px; }
  .report-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--surface2); font-size: 13.5px; }
  .report-row:last-child { border-bottom: none; }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty-state .e-icon { font-size: 30px; margin-bottom: 12px; opacity: .5; }

  @media (max-width: 880px) {
    #sidebar { position: fixed; left: -232px; z-index: 50; transition: left .2s; box-shadow: 8px 0 30px rgba(0,0,0,.4); }
    #sidebar.open { left: 0; }
    main { padding: 20px 16px 50px; }
    .header-user { display: none; }
    .sb-scrim { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 40; }
    .sb-scrim.visible { display: block; }
    .profile-grid, .profile-history-grid, .profile-edit-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="auth-screen">
  <div class="auth-brand">
    <div class="auth-logo">PONTAJ</div>
    <div class="auth-rule"></div>
    <div class="auth-sub" data-i18n="au_sub">Registru electronic · Locație ATTP</div>
  </div>
  <div class="auth-box">
    <div class="auth-fields">
      <div class="field">
        <label class="auth-label" data-i18n="au_email">E-mail</label>
        <input type="email" id="l-email" class="auth-input" data-i18n-ph="au_emailPh" placeholder="nume@exemplu.com" autocomplete="username" onkeydown="if(event.key==='Enter')login()">
      </div>
      <div>
        <label class="auth-label" data-i18n="au_pass">Parolă</label>
        <input type="password" id="l-password" class="auth-input" data-i18n-ph="au_passPh" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="auth-submit" id="login-btn" data-i18n="au_login" onclick="login()">Autentificare</button>
      <div class="auth-hint" id="login-msg"></div>
    </div>
  </div>
  <div class="auth-lang">
    <div class="lang-switch">
      <button class="lang-btn" data-lang="ro" onclick="setLang('ro')">RO</button>
      <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app-shell">
  <div class="sb-scrim" id="sb-scrim" onclick="toggleSidebar(false)"></div>
  <aside id="sidebar">
    <div class="sb-brand">
      <img src="../pontaj/favicon.png" alt="Pontaj">
      <div>
        <div class="sb-brand-text">PONTAJ</div>
        <div class="sb-brand-sub" data-i18n="sb_sub">Registru · ATTP</div>
      </div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-foot">
      <span data-i18n="sb_shift">Schimb curent</span><br><strong id="sb-admin" style="color:var(--text)">—</strong>
    </div>
  </aside>

  <div id="content-scroll">
    <header>
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn-ghost" style="display:none" id="burger-btn" onclick="toggleSidebar()">☰</button>
        <div class="header-title" id="header-title">Tablou de bord</div>
      </div>
      <div class="header-right">
        <div class="lang-switch">
          <button class="lang-btn" data-lang="ro" onclick="setLang('ro')">RO</button>
          <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
        </div>
        <span class="header-user" id="header-user">Rusu Andrei</span>
        <button class="btn-ghost" data-i18n="hdr_logout" onclick="logout()">Ieșire</button>
      </div>
    </header>
    <main id="main"></main>
  </div>
</div>

<!-- ══ PARTICIPANT PROFILE MODAL ══ -->

function todayISO(){ return new Date().toISOString().slice(0,10); }
function uid(){ return Math.random().toString(36).slice(2,9); }
function addDays(iso,n){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function addMonths(iso,n){ const d=new Date(iso+'T00:00:00'); d.setMonth(d.getMonth()+n); return d.toISOString().slice(0,10); }
function daysDiff(iso){ const a=new Date(todayISO()+'T00:00:00'); const b=new Date(iso+'T00:00:00'); return Math.round((b-a)/86400000); }
function fmtDate(iso){ if(!iso) return '—'; const [y,m,d]=iso.split('-'); return `${d}.${m}.${y}`; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function adminName(a){ return a ? `${a.nume} ${a.prenume}` : '—'; }
// nume afișat altor administratori — conturile marcate "ascuns" (proprietar, nu angajat) apar generic
function publicAdminName(a){ return !a ? '—' : (a.ascuns ? (LANG==='ru'?'Администратор':'Administrator') : adminName(a)); }
function visibleAdmins(){ return DB.administratori.filter(a=>!a.ascuns); }

async function fetchAll(){
  const [
    administratoriR, participantiR, intarzieriR, vestimentatieR, serviciuR, spalatorieR,
    hostelR, lenjerieR, dauneR, arbitrajR, inventarR, sarciniR, observatiiR, jurnalR
  ] = await Promise.all([
    sb.from('administratori').select('*'),
    sb.from('participanti').select('*').order('created_at', {ascending:false}),
    sb.from('intarzieri').select('*').order('data', {ascending:false}),
    sb.from('vestimentatie').select('*').order('data', {ascending:false}),
    sb.from('serviciu').select('*').order('data', {ascending:true}),
    sb.from('spalatorie').select('*').order('data', {ascending:false}),
    sb.from('hostel').select('*').order('data_cazare', {ascending:false}),
    sb.from('lenjerie').select('*').order('data_eliberare', {ascending:false}),
    sb.from('daune').select('*').order('data', {ascending:false}),
    sb.from('arbitraj').select('*').order('data', {ascending:false}),
    sb.from('inventar').select('*').order('denumire'),
    sb.from('sarcini').select('*').order('data_inreg', {ascending:false}),
    sb.from('observatii').select('*').order('data', {ascending:false}),
    sb.from('jurnal').select('*').order('data', {ascending:false}).limit(200),
  ]);

  const administratori = administratoriR.data || [];
  const adminById = Object.fromEntries(administratori.map(a=>[a.id, a]));

  DB = {
    administratori,
    participanti: (participantiR.data||[]).map(p=>({
      id:p.id, nrDulap:p.nr_dulap, nume:p.nume, prenume:p.prenume, dataNasterii:p.data_nasterii,
      adresa:p.adresa, telefon:p.telefon, email:p.email, dataAvizMedical:p.data_aviz_medical,
      marime:p.marime, statut:p.statut, dataInregistrarii:p.data_inregistrarii,
    })),
    intarzieri: (intarzieriR.data||[]).map(r=>({id:r.id, participantId:r.participant_id, data:r.data})),
    vestimentatie: (vestimentatieR.data||[]).map(r=>({id:r.id, data:r.data, participantId:r.participant_id, tip:r.tip, culoare:r.culoare, marime:r.marime, cantitate:r.cantitate, dataReturnare:r.data_returnare})),
    serviciu: (serviciuR.data||[]).map(r=>({id:r.id, data:r.data, administratorId:r.administrator_id, administrator: publicAdminName(adminById[r.administrator_id])})),
    spalatorie: (spalatorieR.data||[]).map(r=>({id:r.id, data:r.data, participantId:r.participant_id, tipArticole:r.tip_articole, suma:Number(r.suma)})),
    hostel: (hostelR.data||[]).map(r=>({id:r.id, participantId:r.participant_id, dataCazare:r.data_cazare, observatii:r.observatii})),
    lenjerie: (lenjerieR.data||[]).map(r=>({id:r.id, participantId:r.participant_id, dataEliberare:r.data_eliberare, dataReturnare:r.data_returnare})),
    daune: (dauneR.data||[]).map(r=>({id:r.id, data:r.data, participantId:r.participant_id, inventarAfectat:r.inventar_afectat, natura:r.natura, bunDeterioratDistrus:r.stare, observatii:r.observatii})),
    arbitraj: (arbitrajR.data||[]).map(r=>({id:r.id, data:r.data, arbitru:r.arbitru, turneu:r.turneu, cantitateMingi:r.cantitate_mingi, observatii:r.observatii})),
    inventar: (inventarR.data||[]).map(r=>({id:r.id, denumire:r.denumire, culoare:r.culoare, marime:r.marime, um:r.um, cantitateInitiala:r.cantitate_initiala, intrari:r.intrari, iesiri:r.iesiri, cantitateMinima:r.cantitate_minima, stare:r.stare, observatii:r.observatii})),
    sarcini: (sarciniR.data||[]).map(r=>({id:r.id, dataInreg:r.data_inreg, adminInreg: publicAdminName(adminById[r.admin_inreg_id]), status:r.status, actiuni:r.actiuni, dataSolutionare:r.data_solutionare, adminSolutionare: r.admin_solutionare_id ? publicAdminName(adminById[r.admin_solutionare_id]) : '', descriere:r.descriere})),
    observatii: (observatiiR.data||[]).map(r=>({id:r.id, data:r.data, participantId:r.participant_id, categorie:r.categorie, descriere:r.descriere})),

}

async function logAction(actiune){
  DB.jurnal.unshift({ id: uid(), cont: currentAdmin, data: todayISO(), actiune });
  if (DB.jurnal.length > 200) DB.jurnal.length = 200;
  const { error } = await sb.from('jurnal').insert({ administrator_id: currentAdminId, actiune });

}

function participant(id){ return DB.participanti.find(p=>p.id===id); }

/* ══════════════════════ AUTH ══════════════════════ */
async function login(){
  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-password').value;
  const msg = document.getElementById('login-msg');
  const btn = document.getElementById('login-btn');
  if(!email || !password){ msg.textContent = 'Introduceți e-mail și parolă.'; msg.style.color = 'var(--muted)'; return; }
  btn.disabled = true; btn.textContent = 'Se autentifică…';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = 'Autentificare';
  if(error){
    msg.textContent = 'E-mail sau parolă incorectă.';
    msg.style.color = 'var(--red)';
    return;
  }
  const { data: profile } = await sb.from('administratori').select('*').eq('id', data.user.id).single();
  const displayName = profile ? adminName(profile) : (data.user.email || 'Administrator');
  await enterApp(data.user.id, displayName);
}

async function enterApp(userId, displayName){
  currentAdminId = userId;
  currentAdmin = displayName;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-shell').classList.add('visible');
  document.getElementById('header-user').textContent = currentAdmin;
  document.getElementById('sb-admin').textContent = currentAdmin;
  await fetchAll();
  buildSidebar();
  navigate('dashboard');
}

async function logout(){
  await sb.auth.signOut();
  currentAdmin = null; currentAdminId = null; DB = null;
  document.getElementById('app-shell').classList.remove('visible');
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('login-msg').textContent = '';
  document.getElementById('l-password').value = '';
}

// reia sesiunea dacă administratorul e deja autentificat (session persistă local)
async function resumeSession(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session) return;
  const { data: profile } = await sb.from('administratori').select('*').eq('id', session.user.id).single();
  const displayName = profile ? adminName(profile) : (session.user.email || 'Administrator');
  await enterApp(session.user.id, displayName);
}

function navBadge(id){
  if(!DB) return 0;
  if(id==='medical') return medicalAlerts().length || '';
  if(id==='sarcini') return DB.sarcini.filter(s=>s.status!=='soluționat').length || '';
  if(id==='inventar') return lowStockItems().length || '';
  return '';
}

  const sb = document.getElementById('sidebar'), scrim = document.getElementById('sb-scrim');

  sb.classList.toggle('open', open); scrim.classList.toggle('visible', open);

/* ══════════════════════ DERIVED / ALERTS ══════════════════════ */
function medicalRows(){
  return DB.participanti.filter(p=>p.statut==='activ' && p.dataAvizMedical).map(p=>{
    const expira = addMonths(p.dataAvizMedical, 6);
    const zile = daysDiff(expira);
    let status = 'valabil';
    if(zile < 0) status = 'expirat'; else if(zile <= 30) status = 'expiră curând';
    return { participantId:p.id, nume:participantName(p.id), dataAviz:p.dataAvizMedical, dataExpirare:expira, zile, status };
  }).sort((a,b)=>a.zile-b.zile);
}
function medicalAlerts(){ return medicalRows().filter(r=>r.zile<=7); }
function lowStockItems(){ return DB.inventar.filter(i=> (i.cantitateInitiala+i.intrari-i.iesiri) < i.cantitateMinima); }
function staleTasks(){ return DB.sarcini.filter(s=>s.status!=='soluționat' && daysDiff(s.dataInreg) <= -2); }
function frequentLate(){
  const counts = {};
  DB.intarzieri.forEach(i=>{ if(daysDiff(i.data) >= -30){ counts[i.participantId]=(counts[i.participantId]||0)+1; } });
  return Object.entries(counts).filter(([,c])=>c>=3).map(([pid,c])=>({participantId:pid, count:c}));
}
function inventoryCurrent(item){ return item.cantitateInitiala + item.intrari - item.iesiri; }

function buildAlerts(){
  const alerts = [];
  medicalAlerts().forEach(r=>{
    alerts.push({ level: r.zile<0?'red':'yellow', text: r.zile<0
      ? t('al_medExpired')(r.nume)
      : t('al_medSoon')(r.nume, r.zile) });
  });
  lowStockItems().forEach(i=>{
    alerts.push({ level:'yellow', text: t('al_lowStock')(`${trEnum(i.denumire)}${i.marime!=='—'?' '+i.marime:''}`, inventoryCurrent(i), i.um, i.cantitateMinima) });
  });
  staleTasks().forEach(t2=>{
    alerts.push({ level:'red', text: t('al_staleTask')(t2.descriere) });
  });
  frequentLate().forEach(f=>{
    alerts.push({ level:'yellow', text: t('al_frequentLate')(participantName(f.participantId), f.count) });
  });
  return alerts;
}

  const main = document.getElementById('main');

async function saveParticipantProfile(){
  const p = participant(currentProfileId); if(!p) return;
  const nume = document.getElementById('ep-nume').value.trim();
  const prenume = document.getElementById('ep-prenume').value.trim();
  if(!nume || !prenume){ alert(t('pa_needNumePrenume2')); return; }
  const row = {
    nr_dulap: document.getElementById('ep-dulap').value.trim() || null,
    nume,
    prenume,
    data_nasterii: document.getElementById('ep-nastere').value || null,
    adresa: document.getElementById('ep-adresa').value.trim() || null,
    telefon: document.getElementById('ep-telefon').value.trim() || null,
    email: document.getElementById('ep-email').value.trim() || null,
    data_aviz_medical: document.getElementById('ep-aviz').value || null,
    marime: document.getElementById('ep-marime').value || null,
    statut: document.getElementById('ep-statut').value,
  };
  const saveBtn = document.querySelector('#profile-modal-body .btn-primary');
  if(saveBtn){ saveBtn.disabled = true; saveBtn.textContent = t('btn_saving'); }
  const { data, error } = await sb.from('participanti').update(row).eq('id', p.id).select().single();
  if(error){
    alert('Actualizarea a eșuat: ' + error.message);
    if(saveBtn){ saveBtn.disabled = false; saveBtn.textContent = t('btn_save'); }
    return;
  }
  Object.assign(p, {
    nrDulap:data.nr_dulap, nume:data.nume, prenume:data.prenume, dataNasterii:data.data_nasterii,
    adresa:data.adresa, telefon:data.telefon, email:data.email, dataAvizMedical:data.data_aviz_medical,
    marime:data.marime, statut:data.statut,
  });
  await logAction(`A actualizat profilul participantului ${data.nume} ${data.prenume}`);
  render();
  renderProfile(false);
}

async function addIntarziere(){
  const participantId = document.getElementById('if-participant').value;
  const data = document.getElementById('if-data').value || todayISO();
  if(!participantId) return;
  const { data:row, error } = await sb.from('intarzieri').insert({ participant_id:participantId, data }).select().single();
  if(error){ alert('Salvarea a eșuat: ' + error.message); return; }
  DB.intarzieri.unshift({id:row.id, participantId:row.participant_id, data:row.data});
  await logAction(`A înregistrat o întârziere pentru ${participantName(participantId)}`);
  render();
}
async function removeRow(collection, id){
  const { error } = await sb.from(collection).delete().eq('id', id);
  if(error){ alert('Ștergerea a eșuat: ' + error.message); return; }
  DB[collection] = DB[collection].filter(r=>r.id!==id);
  await logAction(`A șters o înregistrare din „${collection}”`);
  render();
}

async function addLenjerie(){

  if(!participantId) return;

  if(error){ alert('Salvarea a eșuat: ' + error.message); return; }
  DB.lenjerie.unshift({id:data.id, participantId:data.participant_id, dataEliberare:data.data_eliberare, dataReturnare:data.data_returnare});
  await refetchInventar(); // trigger a scăzut automat un set din stoc
  await logAction(`A eliberat lenjerie pentru ${participantName(participantId)}`);
  render();
}
async function toggleLenjerieReturn(id){
  const item = DB.lenjerie.find(l=>l.id===id);
  if(!item) return;
  const dataReturnare = item.dataReturnare ? null : todayISO();
  const { error } = await sb.from('lenjerie').update({ data_returnare:dataReturnare }).eq('id', id);
  if(error){ alert('Actualizarea statutului a eșuat: ' + error.message); return; }
  item.dataReturnare = dataReturnare;
  await logAction(`${dataReturnare?'A marcat ca returnată':'A marcat ca nereturnată'} lenjeria lui ${participantName(item.participantId)}`);
  render();
}

async function adjustInventory(){
  const id = document.getElementById('if2-item').value;
  const tip = document.getElementById('if2-tip').value;
  const cant = parseInt(document.getElementById('if2-cant').value)||1;
  const item = DB.inventar.find(i=>i.id===id); if(!item) return;
  const field = tip==='intrare' ? 'intrari' : 'iesiri';
  const { error } = await sb.from('inventar').update({ [field]: item[field] + cant }).eq('id', id);
  if(error){ alert('Actualizarea a eșuat: ' + error.message); return; }
  await sb.from('inventar_miscari').insert({ inventar_id:id, tip, cantitate:cant, motiv:'Ajustare manuală din pagina Inventar', administrator_id: currentAdminId });
  item[field] += cant;
  await logAction(`A înregistrat ${tip === 'intrare' ? 'o intrare' : 'o ieșire'} de ${cant} ${item.um} — ${item.denumire}`);
  render();
}

async function addSarcina(){
  const desc = document.getElementById('taf-desc').value.trim();
  if(!desc){ alert(t('ta_needDesc')); return; }
  const adminInregId = document.getElementById('taf-admin').value;
  const row = { data_inreg: document.getElementById('taf-data').value||todayISO(), admin_inreg_id:adminInregId, descriere: desc, status:'nesoluționat' };
  const { data, error } = await sb.from('sarcini').insert(row).select().single();
  if(error){ alert('Salvarea a eșuat: ' + error.message); return; }
  const adminObj = DB.administratori.find(a=>a.id===adminInregId);
  DB.sarcini.unshift({id:data.id, dataInreg:data.data_inreg, adminInreg:publicAdminName(adminObj), descriere:data.descriere, status:data.status, actiuni:data.actiuni, dataSolutionare:data.data_solutionare, adminSolutionare:''});
  await logAction(`A înregistrat sarcina: ${desc}`);
  render();

async function updateTaskStatus(id, status){
  const t = DB.sarcini.find(s=>s.id===id); if(!t) return;
  const patch = { status };
  if(status==='soluționat'){ patch.data_solutionare = todayISO(); patch.admin_solutionare_id = currentAdminId; }
  const { error } = await sb.from('sarcini').update(patch).eq('id', id);
  if(error){ alert('Actualizarea a eșuat: ' + error.message); return; }
  t.status = status;
  if(status==='soluționat'){ t.dataSolutionare = todayISO(); t.adminSolutionare = publicAdminName(DB.administratori.find(a=>a.id===currentAdminId)); }
  await logAction(`A schimbat statutul sarcinii „${t.descriere}” în „${status}”`);
  render();
}

  return { from, to, includes: iso => !!iso && iso >= from && iso <= to };
}

      ['Întârzieri înregistrate', DB.intarzieri.filter(r=>range.includes(r.data)).length],
      ['Observații / absențe', DB.observatii.filter(r=>range.includes(r.data)).length],

      ['Avize medicale expirate', medicalRows().filter(r=>r.status==='expirat').length],

    ]},
    { title:'Administrativ', rows:[

function reportFileBase(from,to){ return `raport_${from}_${to}`; }
function excelReportRows(report){
  const rows = [];
  const add = (data, sectiune, tip, persoana='', detalii='', valoare='', unitate='', statut='', dataFinala='') => {
    rows.push({ data:data||'', sectiune, tip, persoana, detalii, valoare, unitate, statut, dataFinala:dataFinala||'' });
  };

  DB.participanti.filter(p=>report.includes(p.dataInregistrarii)).forEach(p=>add(
    p.dataInregistrarii, 'Participanți', 'Participant înregistrat', `${p.nume} ${p.prenume}`,
    [
      p.nrDulap ? `dulap ${p.nrDulap}` : '',
      p.dataNasterii ? `născut(ă) ${fmtDate(p.dataNasterii)}` : '',
      p.telefon || '', p.email || '', p.adresa || '',
      p.marime ? `mărime ${p.marime}` : '',
    ].filter(Boolean).join(' · '), '', '', p.statut
  ));
  DB.participanti.forEach(p=>{
    const expirare = p.dataAvizMedical ? addMonths(p.dataAvizMedical, 6) : '';
    if(!p.dataAvizMedical || report.includes(p.dataAvizMedical) || report.includes(expirare) || expirare < report.to){
      add(p.dataAvizMedical || report.to, 'Medical', 'Aviz medical', `${p.nume} ${p.prenume}`,
        p.dataAvizMedical ? `Expiră la ${fmtDate(expirare)}` : 'Fără aviz medical înregistrat',
        '', '', !p.dataAvizMedical ? 'lipsă' : expirare < report.to ? 'expirat' : 'valabil', expirare);
    }
  });
  DB.intarzieri.filter(r=>report.includes(r.data)).forEach(r=>add(
    r.data, 'Întârzieri', 'Întârziere', participantName(r.participantId)
  ));
  DB.vestimentatie.filter(r=>report.includes(r.data) || report.includes(r.dataReturnare)).forEach(r=>add(
    r.data, 'Vestimentație', 'Eliberare vestimentație', participantName(r.participantId),
    [r.tip, r.culoare, r.marime].filter(Boolean).join(' · '), Number(r.cantitate||0), 'buc',
    r.dataReturnare ? 'returnat' : 'eliberat', r.dataReturnare
  ));
  DB.serviciu.filter(r=>report.includes(r.data)).forEach(r=>add(
    r.data, 'Serviciu administratori', 'Schimb programat', r.administrator
  ));
  DB.spalatorie.filter(r=>report.includes(r.data)).forEach(r=>add(
    r.data, 'Spălătorie', 'Operațiune spălătorie', participantName(r.participantId),
    r.tipArticole || '', Number(r.suma||0), 'MDL'
  ));
  DB.hostel.filter(r=>report.includes(r.dataCazare)).forEach(r=>add(
    r.dataCazare, 'Hostel', 'Cazare', participantName(r.participantId), r.observatii || ''
  ));
  DB.lenjerie.filter(r=>report.includes(r.dataEliberare) || report.includes(r.dataReturnare)).forEach(r=>add(
    r.dataEliberare, 'Lenjerie', 'Eliberare lenjerie', participantName(r.participantId),
    '', 1, 'set', r.dataReturnare ? 'returnat' : 'nereturnat', r.dataReturnare
  ));
  DB.daune.filter(r=>report.includes(r.data)).forEach(r=>add(
    r.data, 'Daune și recuperări', 'Daună', participantName(r.participantId),
    [r.inventarAfectat, r.natura, r.observatii].filter(Boolean).join(' · '),
    '', '', r.bunDeterioratDistrus || ''
  ));
  DB.arbitraj.filter(r=>report.includes(r.data)).forEach(r=>add(
    r.data, 'Arbitraj', 'Eliberare mingi', r.arbitru,
    [r.turneu, r.observatii].filter(Boolean).join(' · '), Number(r.cantitateMingi||0), 'buc'
  ));
  DB.sarcini.filter(r=>report.includes(r.dataInreg) || report.includes(r.dataSolutionare)).forEach(r=>add(
    r.dataInreg, 'Sarcini', 'Sarcină', r.adminInreg,
    [r.descriere, r.actiuni].filter(Boolean).join(' · '), '', '', r.status,
    r.dataSolutionare
  ));
  DB.observatii.filter(r=>report.includes(r.data)).forEach(r=>add(
    r.data, 'Observații', r.categorie || 'Observație', participantName(r.participantId), r.descriere || ''
  ));
  DB.jurnal.filter(r=>report.includes(r.data)).forEach(r=>add(
    r.data, 'Jurnal activitate', 'Acțiune administrator', r.cont, r.actiune || ''
  ));
  DB.inventar.forEach(i=>add(
    report.to, 'Inventar', 'Situație la finalul perioadei', i.denumire,
    [
      i.culoare && i.culoare!=='—' ? `culoare ${i.culoare}` : '',
      i.marime && i.marime!=='—' ? `mărime ${i.marime}` : '',
      `inițial ${i.cantitateInitiala}`,
      `intrări ${i.intrari}`,
      `ieșiri ${i.iesiri}`,
      `minim ${i.cantitateMinima}`,
      i.observatii || '',
    ].filter(Boolean).join(' · '),
    inventoryCurrent(i), i.um, i.stare || ''
  ));

  return rows.sort((a,b)=>String(b.data).localeCompare(String(a.data)) || a.sectiune.localeCompare(b.sectiune));
}
function exportExcelReport(){
  if(!window.XLSX){ alert(t('re_noExcel')); return; }
  const report = reportSections();
  const detailRows = excelReportRows(report);
  const workbook = XLSX.utils.book_new();
  const cheltuieli = DB.spalatorie.filter(r=>report.includes(r.data)).reduce((s,r)=>s+Number(r.suma||0),0);
  const rows = [
    ['RAPORT COMPLET — REGISTRU ELECTRONIC ATTP'],
    [`Perioada: ${fmtDate(report.from)} — ${fmtDate(report.to)}`],
    [],
    ['Înregistrări incluse', detailRows.length, 'Participanți noi', DB.participanti.filter(p=>report.includes(p.dataInregistrarii)).length, 'Cheltuieli spălătorie', cheltuieli, 'MDL'],
    ['Articole inventar', DB.inventar.length, 'Sarcini', DB.sarcini.filter(r=>report.includes(r.dataInreg)).length, 'Daune', DB.daune.filter(r=>report.includes(r.data)).length],
    [],
    ['Data','Secțiune','Tip înregistrare','Participant / responsabil','Detalii complete','Valoare','UM','Statut / rezultat','Finalizare / returnare'],
    ...detailRows.map(r=>[
      r.data ? new Date(`${r.data}T12:00:00`) : '',
      r.sectiune, r.tip, r.persoana, r.detalii, r.valoare, r.unitate, r.statut,
      r.dataFinala ? new Date(`${r.dataFinala}T12:00:00`) : '',
    ]),
  ];
  const sheet = XLSX.utils.aoa_to_sheet(rows, { cellDates:true });
  sheet['!merges'] = [
    XLSX.utils.decode_range('A1:I1'),
    XLSX.utils.decode_range('A2:I2'),
  ];
  sheet['!cols'] = [
    {wch:13}, {wch:24}, {wch:27}, {wch:28}, {wch:64},
    {wch:13}, {wch:10}, {wch:20}, {wch:18},
  ];
  sheet['!rows'] = [{hpt:28},{hpt:21},{hpt:8},{hpt:22},{hpt:22},{hpt:8},{hpt:26}];
  sheet['!autofilter'] = { ref:`A7:I${Math.max(7, rows.length)}` };
  sheet['!freeze'] = { xSplit:0, ySplit:7, topLeftCell:'A8', activePane:'bottomLeft', state:'frozen' };
  sheet['!margins'] = { left:.25, right:.25, top:.5, bottom:.5, header:.2, footer:.2 };
  sheet['!pageSetup'] = { orientation:'landscape', fitToWidth:1, fitToHeight:0, paperSize:9 };
  for(let row=8; row<=rows.length; row++){
    const dateCell = sheet[`A${row}`];
    const finalCell = sheet[`I${row}`];
    if(dateCell) dateCell.z = 'dd.mm.yyyy';
    if(finalCell) finalCell.z = 'dd.mm.yyyy';
  }
  const titleStyle = { font:{bold:true,sz:18,color:{rgb:'C8A96E'}}, fill:{fgColor:{rgb:'111820'}}, alignment:{horizontal:'left',vertical:'center'} };
  const subtitleStyle = { font:{bold:true,sz:11,color:{rgb:'5B6573'}}, fill:{fgColor:{rgb:'E9EDF2'}}, alignment:{horizontal:'left',vertical:'center'} };
  const headerStyle = { font:{bold:true,color:{rgb:'FFFFFF'}}, fill:{fgColor:{rgb:'343D49'}}, alignment:{horizontal:'center',vertical:'center',wrapText:true} };
  if(sheet.A1) sheet.A1.s = titleStyle;
  if(sheet.A2) sheet.A2.s = subtitleStyle;
  for(let col=0; col<9; col++){
    const cell = sheet[XLSX.utils.encode_cell({r:6,c:col})];
    if(cell) cell.s = headerStyle;
  }
  XLSX.utils.book_append_sheet(workbook, sheet, 'Raport complet');
  XLSX.writeFile(workbook, reportFileBase(report.from,report.to)+'.xlsx');
}
function exportPdfReport(){
  if(!window.jspdf?.jsPDF){ alert(t('re_noPdf')); return; }
  const report = reportSections();
  const doc = new window.jspdf.jsPDF();
  const pdfSafe = value => String(value).normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[șş]/g,'s').replace(/[țţ]/g,'t').replace(/[ȘŞ]/g,'S').replace(/[ȚŢ]/g,'T').replace(/[—–]/g,'-');
  const body = [];
  report.sections.forEach(section=>{
    body.push([{content:pdfSafe(section.title), colSpan:2, styles:{fillColor:[232,235,240], textColor:[35,42,52], fontStyle:'bold', cellPadding:2.3}}]);
    section.rows.forEach(row=>body.push([pdfSafe(row[0]), pdfSafe(row[1])]));
  });
  doc.setFontSize(16); doc.text('Raport si statistici', 12, 14);
  doc.setFontSize(9); doc.setTextColor(85); doc.text(`Perioada: ${fmtDate(report.from)} - ${fmtDate(report.to)}`, 12, 20);
  doc.autoTable({
    startY:25,
    head:[['Indicator','Valoare']],
    body,
    theme:'grid',
    margin:{left:12,right:12,top:12,bottom:12},
    styles:{fontSize:8.2, cellPadding:2.1, lineColor:[205,210,218], lineWidth:.15, overflow:'linebreak'},
    headStyles:{fillColor:[55,65,81], textColor:255, fontStyle:'bold', cellPadding:2.4},
    columnStyles:{0:{cellWidth:145},1:{cellWidth:41, halign:'right'}},
    rowPageBreak:'avoid',
  });
  doc.save(reportFileBase(report.from,report.to)+'.pdf');
}
function printReport(){
  const report = reportSections();
  const popup = window.open('', '_blank', 'width=900,height=700');
  if(!popup){ alert(t('re_popupBlocked')); return; }
  const sectionsHtml = report.sections.map(section=>`
    <section><h2>${esc(section.title)}</h2><table><thead><tr><th>Indicator</th><th>Valoare</th></tr></thead>
    <tbody>${section.rows.map(r=>`<tr><td>${esc(r[0])}</td><td>${esc(r[1])}</td></tr>`).join('')}</tbody></table></section>`).join('');
  popup.document.write(`<!doctype html><html lang="ro"><head><meta charset="utf-8"><title>Raport</title>
    <style>body{font-family:Arial,sans-serif;color:#111;margin:32px}h1{margin:0 0 6px}p{color:#555;margin:0 0 24px}
    h2{font-size:16px;margin:24px 0 8px}table{width:100%;border-collapse:collapse}th,td{padding:8px 10px;border:1px solid #ccc;text-align:left}
    th:last-child,td:last-child{text-align:right}@media print{body{margin:12mm}section{break-inside:avoid}}</style></head>
    <body><h1>Raport și statistici</h1><p>Perioada: ${fmtDate(report.from)} — ${fmtDate(report.to)}</p>${sectionsHtml}</body></html>`);
  popup.document.close();
  popup.focus();
  setTimeout(()=>popup.print(), 300);
}
